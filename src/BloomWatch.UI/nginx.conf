server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal resolver; re-resolve every 10s so Railway redeploys propagate
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to the backend service
    location /api/ {
        set $backend "bloomwatch-api.railway.internal:8080";
        proxy_pass http://$backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed assets: cache forever (content-addressable)
    location ~* "\.[0-9a-f]{8,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|webp|ico)$" {
        add_header Cache-Control "max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all other routes served as index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
