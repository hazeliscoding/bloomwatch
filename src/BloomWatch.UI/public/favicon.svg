<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hot pink rounded-square background -->
  <rect width="32" height="32" rx="8" fill="#ff2d8a"/>
  <!-- Cherry blossom: 5 petals rotated around centre (16,16) -->
  <ellipse cx="16" cy="9.5" rx="3" ry="5.2" fill="white" opacity="0.92" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="9.5" rx="3" ry="5.2" fill="white" opacity="0.92" transform="rotate(72 16 16)"/>
  <ellipse cx="16" cy="9.5" rx="3" ry="5.2" fill="white" opacity="0.92" transform="rotate(144 16 16)"/>
  <ellipse cx="16" cy="9.5" rx="3" ry="5.2" fill="white" opacity="0.92" transform="rotate(216 16 16)"/>
  <ellipse cx="16" cy="9.5" rx="3" ry="5.2" fill="white" opacity="0.92" transform="rotate(288 16 16)"/>
  <!-- Centre disk (light pink like the badge dot) -->
  <circle cx="16" cy="16" r="3.8" fill="#ff85b8"/>
  <!-- Five tiny stamen dots -->
  <circle cx="16"    cy="13.3" r="0.65" fill="white" opacity="0.85"/>
  <circle cx="18.02" cy="14.5" r="0.65" fill="white" opacity="0.85"/>
  <circle cx="17.18" cy="16.8" r="0.65" fill="white" opacity="0.85"/>
  <circle cx="14.82" cy="16.8" r="0.65" fill="white" opacity="0.85"/>
  <circle cx="13.98" cy="14.5" r="0.65" fill="white" opacity="0.85"/>
</svg>
