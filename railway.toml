[build]
  builder = "DOCKERFILE"

[[services]]
  name = "bloomwatch-api"
  source = "Dockerfile"

  [services.deploy]
    healthcheckPath = "/health"
    healthcheckTimeout = 10
    restartPolicyType = "ON_FAILURE"
    restartPolicyMaxRetries = 3

[[services]]
  name = "bloomwatch-frontend"
  source = "src/BloomWatch.UI/Dockerfile"

  [services.deploy]
    restartPolicyType = "ON_FAILURE"
    restartPolicyMaxRetries = 3
