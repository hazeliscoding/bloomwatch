name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/bloomwatch-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bloomwatch-frontend

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/BloomWatch.UI/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}

  migrate:
    name: Run EF Core migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef

      - name: Build solution (required before ef migrate)
        run: dotnet build src/BloomWatch.Api/BloomWatch.Api.csproj -c Release --nologo -q

      - name: Migrate — Identity
        run: |
          dotnet ef database update \
            --project src/Modules/Identity/BloomWatch.Modules.Identity.Infrastructure \
            --startup-project src/BloomWatch.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_URL }}

      - name: Migrate — WatchSpaces
        run: |
          dotnet ef database update \
            --project src/Modules/WatchSpaces/BloomWatch.Modules.WatchSpaces.Infrastructure \
            --startup-project src/BloomWatch.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_URL }}

      - name: Migrate — AniListSync
        run: |
          dotnet ef database update \
            --project src/Modules/AniListSync/BloomWatch.Modules.AniListSync.Infrastructure \
            --startup-project src/BloomWatch.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_URL }}

      - name: Migrate — AnimeTracking
        run: |
          dotnet ef database update \
            --project src/Modules/AnimeTracking/BloomWatch.Modules.AnimeTracking.Infrastructure \
            --startup-project src/BloomWatch.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3

      - name: Deploy API service
        run: railway up --service bloomwatch-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend service
        run: railway up --service bloomwatch-frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
