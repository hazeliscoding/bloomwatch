name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "github" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./test-results

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/BloomWatch.UI

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/BloomWatch.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
